services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freeeman_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - freeeman-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=20)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: freeeman_bot
    env_file:
      - ./bot/.env
    environment:
      API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - freeeman-network
    restart: unless-stopped

networks:
  freeeman-network:
    driver: bridge
