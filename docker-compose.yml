services:
  freeman-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freeman_backend
    env_file:
      - ./backend/.env
    environment:
      AWS_S3_ENDPOINT_URL: http://freeman-minio:9000
    ports:
      - "8000:8000"
    depends_on:
      freeman-minio:
        condition: service_started
    networks:
      - freeeman-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=20)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  freeman-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: freeman_bot
    env_file:
      - ./bot/.env
    environment:
      API_URL: http://freeman-backend:8000
    depends_on:
      freeman-backend:
        condition: service_healthy
    networks:
      - freeeman-network
    restart: unless-stopped

  freeman-admin-bot:
    build:
      context: ./admin-bot
      dockerfile: Dockerfile
    container_name: freeeman_admin_bot
    env_file:
      - ./admin-bot/.env
    environment:
      API_URL: http://freeman-backend:8000
    depends_on:
      freeman-backend:
        condition: service_healthy
    networks:
      - freeeman-network
    restart: unless-stopped

  freeman-minio:
    image: quay.io/minio/minio
    container_name: freeman-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supersecretpassword}
      MINIO_ADDRESS: ":9000"
      MINIO_CONSOLE_ADDRESS: ":9001"
    volumes:
      - ./minio-data:/data
    command: server /data
    networks:
      - freeeman-network
    restart: unless-stopped

  freeman-minio-init:
    image: minio/mc
    container_name: freeman-minio-init
    depends_on:
      - freeman-minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://freeman-minio:9000 "${MINIO_ROOT_USER:-admin}" "${MINIO_ROOT_PASSWORD:-supersecretpassword}" >/dev/null 2>&1; do
          sleep 1
        done
        mc mb --ignore-existing local/freeman-bucket
    networks:
      - freeeman-network
    restart: "no"

networks:
  freeeman-network:
    driver: bridge
